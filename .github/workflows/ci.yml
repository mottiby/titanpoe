name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Dummy values — CI runs lint/typecheck/test/build, never connects to a DB.
      DATABASE_URL: postgresql://user:pass@localhost:5432/db
      AUTH_SECRET: ci-dummy-secret-not-used
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
